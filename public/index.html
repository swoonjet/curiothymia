<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curiothymia</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=IBM+Plex+Mono:wght@300;400&display=swap');

  :root {
    --black: #0a0a0b;
    --ink: #141416;
    --dim: #777;
    --muted: #999;
    --bone: #ddd8d0;
    --accent: #c8a87a;
    --cool: #8b9dc3;
    --mono: 'IBM Plex Mono', monospace;
    --serif: 'Instrument Serif', Georgia, serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--black); color: var(--bone);
    font-family: var(--mono);
    overflow: hidden; width: 100vw; height: 100vh;
  }

  /* ── Seed screen ── */
  .seed {
    position: fixed; inset: 0; z-index: 200;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; background: var(--black);
    transition: opacity 1s ease;
  }
  .seed--gone { opacity: 0; pointer-events: none; }
  .seed h1 {
    font-family: var(--serif); font-size: clamp(28px, 5vw, 56px);
    font-weight: 400; letter-spacing: -0.02em; margin-bottom: 4px;
  }
  .seed .sub {
    font-size: 8px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--dim); margin-bottom: 48px;
  }
  .seed .chips {
    display: flex; gap: 6px; flex-wrap: wrap; justify-content: center;
    margin-bottom: 12px; min-height: 36px;
  }
  .chip {
    font-family: var(--serif); font-size: 17px; padding: 6px 16px;
    background: #1a1a1e; border: 1px solid #2a2a30;
    display: flex; align-items: center; gap: 8px;
  }
  .chip .x {
    cursor: pointer; font-family: var(--mono); font-size: 11px; color: var(--dim);
  }
  .chip .x:hover { color: var(--bone); }
  .seed .row { display: flex; gap: 6px; }
  .seed input {
    background: var(--ink); border: 1px solid #2a2a30; color: var(--bone);
    padding: 10px 18px; font-family: var(--serif); font-size: 16px;
    outline: none; width: 240px;
  }
  .seed input:focus { border-color: var(--accent); }
  .seed input::placeholder { color: #888; }
  .sbtn {
    background: none; border: 1px solid #2a2a30; color: var(--dim);
    padding: 10px 18px; font-family: var(--mono); font-size: 8px;
    letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer;
    transition: all 0.3s;
  }
  .sbtn:hover { border-color: var(--accent); color: var(--accent); }
  .seed .go {
    margin-top: 24px; background: var(--accent); border-color: var(--accent);
    color: var(--black); display: none;
  }
  .seed .go:hover { background: var(--bone); }

  /* ── Main layout ── */
  .app { display: flex; width: 100vw; height: 100vh; }

  /* ── Left gallery sidebar ── */
  .gal {
    width: 0; min-width: 0;
    background: var(--ink);
    border-right: 1px solid #1a1a1e;
    display: flex; flex-direction: column;
    overflow: hidden;
    transition: width 0.4s ease, min-width 0.4s ease;
    z-index: 15;
    flex-shrink: 0;
  }
  .gal--open { width: 72px; min-width: 72px; }
  .gal-head {
    padding: 10px 0;
    text-align: center;
    flex-shrink: 0;
  }
  .gal-title {
    font-size: 7px; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--dim); writing-mode: vertical-rl;
    margin: 0 auto;
  }
  .gal--open .gal-title { writing-mode: horizontal-tb; }
  .gal-list {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    padding: 4px 8px; display: flex; flex-direction: column; gap: 4px;
  }
  .gal-list::-webkit-scrollbar { width: 0; }
  .gt {
    width: 54px; height: 36px;
    border: 1px solid transparent;
    cursor: pointer; overflow: hidden;
    flex-shrink: 0; position: relative;
    opacity: 0.5; transition: all 0.2s;
  }
  .gt:hover { opacity: 1; border-color: var(--accent); }
  .gt.active { opacity: 1; border-color: var(--accent); }
  .gt img { width: 100%; height: 100%; object-fit: cover; }
  .gt .gn {
    position: absolute; bottom: 0; right: 1px;
    font-size: 6px; color: #555; letter-spacing: 0.05em;
    text-shadow: 0 0 3px var(--black);
  }

  /* ── Header bar ── */
  .hdr {
    position: fixed; top: 0; left: 0; right: 0; z-index: 18;
    height: 32px;
    display: none; align-items: center;
    padding: 0 14px;
    background: rgba(10,10,11,0.6);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid #1a1a1e;
  }
  .hdr--on { display: flex; }
  .hdr-name {
    font-family: var(--serif); font-size: 14px; font-weight: 400;
    color: var(--bone); opacity: 0.85; letter-spacing: 0.02em;
    margin-left: 68px;
  }
  .hdr-threads-btn {
    margin-left: auto;
    background: none; border: 1px solid #444; color: #aaa;
    padding: 3px 10px; font-family: var(--mono); font-size: 7px;
    letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer;
    transition: all 0.3s;
  }
  .hdr-threads-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Thread archive panel ── */
  .tarch {
    position: fixed; top: 32px; right: 0; bottom: 0; z-index: 25;
    width: 340px;
    background: rgba(14,14,16,0.95);
    backdrop-filter: blur(12px);
    border-left: 1px solid #1a1a1e;
    transform: translateX(100%);
    transition: transform 0.4s ease;
    overflow-y: auto;
    padding: 20px 16px;
  }
  .tarch--open { transform: translateX(0); }
  .tarch::-webkit-scrollbar { width: 3px; }
  .tarch::-webkit-scrollbar-thumb { background: #222; }
  .tarch-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .tarch-title {
    font-size: 8px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--dim);
  }
  .tarch-close {
    background: none; border: none; color: var(--dim); cursor: pointer;
    font-family: var(--mono); font-size: 11px; padding: 2px 6px;
    transition: color 0.2s;
  }
  .tarch-close:hover { color: var(--bone); }
  .tarch-list { display: flex; flex-direction: column; gap: 12px; }
  .tarch-item {
    padding: 10px 12px;
    background: rgba(26,26,30,0.6);
    border-left: 2px solid #444;
    cursor: default;
    transition: border-color 0.2s;
  }
  .tarch-item:hover { border-color: var(--accent); }
  .tarch-item .ta-cycle {
    font-size: 7px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--dim); margin-bottom: 4px;
  }
  .tarch-item .ta-text {
    font-family: var(--serif); font-size: 14px; line-height: 1.4;
    color: var(--bone); opacity: 0.9;
  }
  .tarch-item .ta-kw {
    font-size: 7px; letter-spacing: 0.08em; color: var(--accent);
    margin-top: 6px; opacity: 0.6;
  }
  .tarch-empty {
    font-size: 8px; color: #888; letter-spacing: 0.1em; text-transform: uppercase;
  }

  /* ── Canvas area ── */
  .canvas { flex: 1; position: relative; overflow: hidden; }

  .comp {
    position: absolute; inset: 0;
    transition: opacity 2s ease;
  }
  .comp--entering { opacity: 0; }
  .comp--visible { opacity: 1; }
  .comp--exiting { opacity: 0; }

  /* Image layers — overlap, no borders */
  .lyr {
    position: absolute; overflow: hidden;
    opacity: 0; transition: opacity 1.2s ease;
    cursor: pointer;
  }
  .lyr--on { opacity: var(--op, 1); }
  .lyr img {
    display: block; width: 100%; height: 100%; object-fit: cover;
  }

  /* ── Overlays ── */
  .ov-cycle {
    position: fixed; top: 10px; left: 82px; z-index: 10;
    font-family: var(--serif); font-size: clamp(40px, 7vw, 100px);
    font-weight: 400; color: var(--bone); opacity: 0.03;
    mix-blend-mode: overlay; pointer-events: none; line-height: 0.85;
  }
  .ov-kw {
    position: fixed; bottom: 12px; left: 82px; z-index: 10;
    pointer-events: none;
  }
  .ov-kw .kc {
    font-size: 7px; letter-spacing: 0.12em; text-transform: uppercase;
    color: #777; margin-bottom: 2px;
  }
  .ov-kw .kw {
    font-family: var(--serif); font-size: clamp(11px, 1.4vw, 18px);
    color: var(--bone); opacity: 0.6;
  }
  .ov-kw .kw span {
    display: inline-block; opacity: 0;
    animation: rise 0.5s ease forwards;
  }
  .ov-kw .sep { color: #555; margin: 0 0.1em; }
  @keyframes rise { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; } }

  .ov-q {
    position: fixed; top: 10px; right: 12px; z-index: 10;
    display: flex; flex-direction: column; align-items: flex-end; gap: 1px;
    pointer-events: none;
  }
  .qt {
    font-size: 7px; letter-spacing: 0.05em; color: #777;
    padding: 1px 4px;
    opacity: 0; animation: qf 0.3s ease forwards;
  }
  @keyframes qf { from { opacity: 0; transform: translateX(3px); } to { opacity: 0.55; } }

  .ov-st {
    position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
    z-index: 20; display: none; align-items: center; gap: 4px;
    padding: 3px 8px; background: rgba(10,10,11,0.4);
    backdrop-filter: blur(6px);
  }
  .ov-st .dot { width: 4px; height: 4px; border-radius: 50%; background: #333; }
  .ov-st .dot--on { background: var(--accent); animation: p 1.2s ease infinite; }
  @keyframes p { 0%,100% { opacity: 1; } 50% { opacity: 0.2; } }
  .ov-st .stxt { font-size: 7px; letter-spacing: 0.1em; text-transform: uppercase; color: #888; }

  /* ── Thread flash ── */
  .tf {
    position: fixed; inset: 0; z-index: 50;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 12px;
    background: rgba(10,10,11,0.92); backdrop-filter: blur(20px);
    opacity: 0; pointer-events: none;
    transition: opacity 0.8s ease;
  }
  .tf--on { opacity: 1; cursor: pointer; }
  .tf .tfl { font-size: 7px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--dim); }
  .tf .tft {
    font-family: var(--serif); font-size: clamp(15px, 2.2vw, 30px);
    font-weight: 400; color: var(--bone); text-align: center;
    max-width: 50%; line-height: 1.3;
  }
  .tf .tfn { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 4px; }

  /* ── End prompt ── */
  .end-prompt {
    position: fixed; inset: 0; z-index: 55;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 14px;
    background: rgba(10,10,11,0.9); backdrop-filter: blur(16px);
    opacity: 0; pointer-events: none;
    transition: opacity 0.6s ease;
  }
  .end-prompt--on { opacity: 1; pointer-events: auto; }
  .end-prompt .ep-count {
    font-size: 7px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--dim);
  }
  .end-prompt .ep-msg {
    font-family: var(--serif); font-size: clamp(16px, 2.5vw, 28px);
    color: var(--bone); text-align: center; max-width: 45%; line-height: 1.3;
  }
  .end-prompt .ep-btns { display: flex; gap: 10px; margin-top: 6px; }
  .tf .tfk {
    font-family: var(--serif); font-size: clamp(10px, 1.2vw, 15px);
    color: var(--accent); padding: 3px 10px;
    border: 1px solid rgba(200,168,122,0.15);
    opacity: 0; animation: rise 0.4s ease forwards;
  }

  /* ── Pause ── */
  .pov {
    position: fixed; inset: 0; z-index: 55;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 12px;
    background: rgba(10,10,11,0.8); backdrop-filter: blur(12px);
    opacity: 0; pointer-events: none;
    transition: opacity 0.4s ease;
  }
  .pov--on { opacity: 1; pointer-events: auto; }
  .pov .pl { font-size: 7px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--dim); }
  .pov .pt {
    font-family: var(--serif); font-size: clamp(13px, 1.8vw, 22px);
    color: var(--bone); text-align: center; max-width: 45%; line-height: 1.3;
  }
  .pov .pb { display: flex; gap: 10px; margin-top: 4px; }

  /* ── Gallery preview overlay ── */
  .gal-preview {
    position: fixed; inset: 0; z-index: 30;
    background: rgba(10,10,11,0.85);
    backdrop-filter: blur(8px);
    opacity: 0; pointer-events: none;
    transition: opacity 0.4s ease;
    overflow: hidden;
  }
  .gal-preview--on { opacity: 1; pointer-events: auto; }
  .gal-preview .gp-close {
    position: absolute; top: 12px; left: 82px; z-index: 32;
    background: rgba(10,10,11,0.8); border: 1px solid var(--bone);
    color: var(--bone);
    padding: 8px 20px; font-family: var(--mono); font-size: 8px;
    letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer;
    transition: all 0.3s;
    backdrop-filter: blur(8px);
  }
  .gal-preview .gp-close:hover { background: var(--bone); color: var(--black); }
  .gal-preview .gp-info {
    position: absolute; bottom: 12px; left: 82px; z-index: 32;
    pointer-events: none;
  }
  .gal-preview .gp-info .gp-cycle {
    font-size: 7px; letter-spacing: 0.12em; text-transform: uppercase; color: #888;
  }
  .gal-preview .gp-info .gp-kw {
    font-family: var(--serif); font-size: clamp(11px, 1.4vw, 18px);
    color: var(--bone); opacity: 0.7;
  }
  .gal-preview .gp-canvas {
    position: absolute; inset: 0;
  }

  /* ── Volume toggle ── */
  .vol-toggle {
    position: fixed; bottom: 12px; right: 12px; z-index: 20;
    background: rgba(10,10,11,0.5); border: 1px solid #1e1e22;
    backdrop-filter: blur(6px);
    color: #888; padding: 5px 10px;
    font-family: var(--mono); font-size: 7px;
    letter-spacing: 0.1em; text-transform: uppercase;
    cursor: pointer; transition: all 0.3s;
    display: none;
  }
  .vol-toggle:hover { border-color: var(--accent); color: var(--accent); }
  .vol-toggle--on { color: var(--muted); border-color: #888; }

  /* ── Lightbox ── */
  .lb {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(10,10,11,0.95);
    display: none; align-items: center; justify-content: center;
    flex-direction: column; cursor: pointer; padding: 40px;
  }
  .lb--on { display: flex; }
  .lb img { max-width: 85%; max-height: 75%; object-fit: contain; }
  .lb .lbt { font-family: var(--serif); font-size: 13px; margin-top: 10px; color: var(--bone); }
  .lb .lbs { font-size: 7px; letter-spacing: 0.08em; color: var(--dim); margin-top: 2px; text-transform: uppercase; }
</style>
</head>
<body>

<div class="seed" id="seed">
  <h1>Curiothymia</h1>
  <div class="sub" style="color:var(--bone);letter-spacing:0.25em;">Let your mind wander</div>
  <div class="chips" id="chips"></div>
  <div class="row">
    <input type="text" id="inp" placeholder="a word, an idea..." maxlength="40" autofocus>
    <button class="sbtn" onclick="addSeed()">add</button>
  </div>
  <button class="sbtn go" id="go" onclick="start()">start</button>
</div>

<div class="app">
  <div class="gal" id="gal">
    <div class="gal-head"><span class="gal-title">threads</span></div>
    <div class="gal-list" id="galList"></div>
  </div>
  <div class="canvas" id="canvas"></div>
</div>

<div class="hdr" id="hdr">
  <span class="hdr-name">Curiothymia</span>
  <button class="hdr-threads-btn" id="threadBtn" onclick="toggleArchive()">threads <span id="threadCount">0</span></button>
</div>

<div class="tarch" id="tarch">
  <div class="tarch-head">
    <span class="tarch-title">Thread Archive</span>
    <button class="tarch-close" onclick="toggleArchive()">&times;</button>
  </div>
  <div class="tarch-list" id="tarchList">
    <div class="tarch-empty">threads will appear here</div>
  </div>
</div>

<div class="ov-cycle" id="ovCycle" aria-hidden="true"></div>
<div class="ov-kw" id="ovKw">
  <div class="kc" id="kc"></div>
  <div class="kw" id="kwW"></div>
</div>
<div class="ov-q" id="ovQ"></div>
<div class="ov-st" id="st">
  <div class="dot" id="dot"></div>
  <span class="stxt" id="stxt"></span>
</div>

<div class="tf" id="tf" onclick="skipThread()">
  <div class="tfl" id="tfl"></div>
  <div class="tft" id="tft"></div>
  <div class="tfn" id="tfn"></div>

</div>

<div class="end-prompt" id="endPrompt">
  <div class="ep-count" id="epCount"></div>
  <div class="ep-msg">40 threads explored. Start a new journey?</div>
  <div class="ep-btns">
    <button class="sbtn" onclick="keepGoing()">keep going</button>
    <button class="sbtn" onclick="restart()">new seeds</button>
  </div>
</div>

<div class="pov" id="pov">
  <div class="pl">paused</div>
  <div class="pt" id="pt"></div>
  <div class="pb">
    <button class="sbtn" onclick="resume()">continue</button>
    <button class="sbtn" onclick="restart()">new seeds</button>
  </div>
</div>

<button class="vol-toggle" id="volBtn" onclick="toggleAudio()">sound off</button>

<div class="gal-preview" id="gp">
  <button class="gp-close" onclick="closeGp()">close</button>
  <div class="gp-canvas" id="gpCanvas"></div>
  <div class="gp-info">
    <div class="gp-cycle" id="gpCycle"></div>
    <div class="gp-kw" id="gpKw"></div>
  </div>
</div>

<div class="lb" id="lb" onclick="closeLb()">
  <img id="lbI" src="">
  <div class="lbt" id="lbT"></div>
  <div class="lbs" id="lbS"></div>
</div>

<script>
const S = {
  seeds: [], kw: [], cycle: 0, running: false, paused: false,
  prev: [], images: [], queries: [], thread: '', hold: 10000,
  boards: [], seenUrls: [], seenTitles: [], threads: []
};

// ── Seeds ──
const inp = document.getElementById('inp');
inp.addEventListener('keydown', e => { if (e.key === 'Enter') addSeed(); });

function addSeed() {
  const v = inp.value.trim().toLowerCase();
  if (!v || S.seeds.length >= 5 || S.seeds.includes(v)) return;
  S.seeds.push(v); inp.value = '';
  renderChips();
  document.getElementById('go').style.display = 'inline-block';
}
function remSeed(k) {
  S.seeds = S.seeds.filter(s => s !== k); renderChips();
  if (!S.seeds.length) document.getElementById('go').style.display = 'none';
}
function renderChips() {
  document.getElementById('chips').innerHTML = S.seeds.map(s =>
    `<div class="chip">${esc(s)}<span class="x" onclick="remSeed('${esc(s)}')">\u00d7</span></div>`
  ).join('');
}

// ═══════════════════════════════════════════════
// COMPOSITION — Overlapping collage, one hero
// ═══════════════════════════════════════════════
// Blend modes that keep images VISIBLE on dark backgrounds
// No multiply (darkens to black), no luminosity (washes out), no color-dodge (blows out)
const BLENDS = ['screen','overlay','soft-light','lighten'];
const COLOR_FX = [
  'sepia(0.25) brightness(1.05)',
  'sepia(0.15) saturate(1.3)',
  'hue-rotate(15deg) brightness(1.05)',
  'hue-rotate(-15deg) brightness(1.05)',
  'hue-rotate(30deg) saturate(1.1)',
  'hue-rotate(-30deg) saturate(1.1)',
  'hue-rotate(90deg) brightness(1.05)',
  'hue-rotate(180deg) brightness(1.1)',
  'saturate(1.6) brightness(1.05)',
  'saturate(2.0)',
  'brightness(1.15) saturate(1.2)',
  'brightness(1.1) contrast(1.1) saturate(1.2)',
  'brightness(1.05) hue-rotate(10deg) saturate(1.3)',
  'brightness(1.1) hue-rotate(-20deg) saturate(1.2)',
];

function buildComp(images, preview) {
  const comp = document.createElement('div');
  comp.className = 'comp comp--entering';

  const cEl = document.getElementById('canvas');
  const vw = cEl.offsetWidth;
  const vh = cEl.offsetHeight;
  const count = Math.min(images.length, 20); // more images per board

  for (let i = 0; i < count; i++) {
    const img = images[i];
    const isHero = (i === 0);

    const lyr = document.createElement('div');
    lyr.className = 'lyr';

    let x, y, w, h, blend, z;

    if (isHero) {
      w = vw * rand(0.55, 0.8);
      h = vh * rand(0.55, 0.8);
      x = rand(0, vw - w);
      y = rand(0, vh - h);
      blend = 'normal';
      z = 10;
    } else {
      // All layers full opacity, varied sizes
      const sizeRoll = Math.random();
      if (sizeRoll < 0.25) {
        w = vw * rand(0.1, 0.2);
        h = vh * rand(0.1, 0.2);
      } else if (sizeRoll < 0.55) {
        w = vw * rand(0.18, 0.35);
        h = vh * rand(0.18, 0.35);
      } else if (sizeRoll < 0.8) {
        w = vw * rand(0.3, 0.5);
        h = vh * rand(0.3, 0.5);
      } else {
        w = vw * rand(0.45, 0.65);
        h = vh * rand(0.45, 0.65);
      }

      // Place so images stay mostly within viewport
      x = rand(-w * 0.05, vw - w * 0.7);
      y = rand(-h * 0.05, vh - h * 0.7);

      // ~40% get a blend mode
      blend = Math.random() < 0.4
        ? BLENDS[Math.floor(rand(0, BLENDS.length))]
        : 'normal';

      // Every image gets its own z-index — later images stack higher
      // so nothing gets fully buried
      z = i + 1;
    }

    // ~25% get a random color effect
    let filter = 'none';
    if (Math.random() < 0.25) {
      filter = COLOR_FX[Math.floor(rand(0, COLOR_FX.length))];
    }

    lyr.style.cssText = `
      left:${x}px; top:${y}px; width:${w}px; height:${h}px;
      --op:1; mix-blend-mode:${blend}; z-index:${z};
    `;

    const imgEl = document.createElement('img');
    imgEl.src = img.thumbUrl || img.imageUrl;
    imgEl.alt = img.title || '';
    imgEl.loading = i < 6 ? 'eager' : 'lazy';
    imgEl.crossOrigin = 'anonymous';
    if (filter !== 'none') imgEl.style.filter = filter;
    imgEl.onerror = function() { this.parentElement.remove(); };

    // Detect light background on load → set multiply blend
    imgEl.addEventListener('load', function() {
      if (detectLightBg(this)) {
        this.parentElement.style.mixBlendMode = 'multiply';
      }
    });

    lyr.appendChild(imgEl);
    if (!preview) {
      lyr.addEventListener('click', e => { e.stopPropagation(); openLb(img); });
    }
    comp.appendChild(lyr);
  }

  return comp;
}

function showComp(comp) {
  const canvas = document.getElementById('canvas');

  // Clear ALL old compositions — hard reset, no stacking
  canvas.innerHTML = '';

  canvas.appendChild(comp);
  comp.offsetHeight;

  const layers = comp.querySelectorAll('.lyr');
  layers.forEach((l, i) => setTimeout(() => l.classList.add('lyr--on'), 80 + i * 80));

  requestAnimationFrame(() => {
    comp.classList.remove('comp--entering');
    comp.classList.add('comp--visible');
  });
}

// ── Overlays ──
function updateOv() {
  document.getElementById('ovCycle').textContent = String(S.cycle).padStart(2, '0');
  document.getElementById('kc').textContent =
    `${String(S.cycle).padStart(2, '0')} \u2014 ${S.images.length} \u2014 ${S.queries.length} paths`;
  document.getElementById('kwW').innerHTML = S.kw.map((k, i) => {
    const sep = i < S.kw.length - 1 ? '<span class="sep">/</span>' : '';
    return `<span style="animation-delay:${i * 70}ms">${esc(k)}</span>${sep}`;
  }).join('');
  document.getElementById('ovQ').innerHTML = S.queries.slice(0, 8).map((t, i) =>
    `<span class="qt" style="animation-delay:${400 + i * 70}ms">${esc(t)}</span>`
  ).join('');
}

function setSt(t, on) {
  document.getElementById('st').style.display = 'flex';
  document.getElementById('dot').className = on ? 'dot dot--on' : 'dot';
  document.getElementById('stxt').textContent = t;
}

// ═══════════════════════════════════════════════
// GALLERY SIDEBAR
// ═══════════════════════════════════════════════
function saveBoard() {
  const thumb = S.images[0] ? (S.images[0].thumbUrl || S.images[0].imageUrl) : '';
  S.boards.push({
    cycle: S.cycle, kw: [...S.kw], queries: [...S.queries],
    images: [...S.images], thumbUrl: thumb
  });
  renderGal();
}

function renderGal() {
  const g = document.getElementById('gal');
  g.classList.add('gal--open');
  const list = document.getElementById('galList');
  list.innerHTML = S.boards.map((b, i) =>
    `<div class="gt ${i === S.boards.length - 1 ? 'active' : ''}" onclick="viewBoard(${i})">
      <img src="${b.thumbUrl}" alt="cycle ${b.cycle}">
      <span class="gn">${String(b.cycle).padStart(2, '0')}</span>
    </div>`
  ).join('');
  list.scrollTop = list.scrollHeight;
}

let gpBoardIdx = -1;

function viewBoard(idx) {
  gpBoardIdx = idx;
  renderGpBoard();
}

function renderGpBoard() {
  const b = S.boards[gpBoardIdx];
  if (!b) return;

  const gpCanvas = document.getElementById('gpCanvas');
  gpCanvas.innerHTML = '';

  const previewComp = buildComp(b.images, true); // true = preview mode (no lightbox)
  previewComp.classList.remove('comp--entering');
  previewComp.classList.add('comp--visible');
  gpCanvas.appendChild(previewComp);
  setTimeout(() => {
    previewComp.querySelectorAll('.lyr').forEach(l => l.classList.add('lyr--on'));
  }, 50);

  document.getElementById('gpCycle').textContent =
    `${String(b.cycle).padStart(2, '0')} \u2014 ${b.images.length} artifacts`;
  document.getElementById('gpKw').textContent = b.kw.join(' / ');

  document.getElementById('gp').classList.add('gal-preview--on');
  document.querySelectorAll('.gt').forEach((t, i) => t.classList.toggle('active', i === gpBoardIdx));

  // Click anywhere on the preview canvas to regenerate the layout
  gpCanvas.onclick = (e) => {
    e.stopPropagation();
    renderGpBoard(); // rebuild with new random positions/blends/effects
  };
}

function closeGp() {
  document.getElementById('gp').classList.remove('gal-preview--on');
  // Re-highlight current cycle in gallery
  document.querySelectorAll('.gt').forEach((t, i) =>
    t.classList.toggle('active', i === S.boards.length - 1));
}

// ═══════════════════════════════════════════════
// ENGINE
// ═══════════════════════════════════════════════
async function start() {
  S.kw = [...S.seeds]; S.running = true; S.paused = false; S.cycle = 0;
  document.getElementById('seed').classList.add('seed--gone');
  document.getElementById('volBtn').style.display = 'block';
  document.getElementById('hdr').classList.add('hdr--on');
  while (S.running) {
    if (S.paused) { await sleep(300); continue; }
    await runCycle();
  }
}

async function runCycle() {
  S.cycle++;
  setSt('expanding', true);

  let queries = [...S.kw];
  try {
    const r = await fetch('/api/expand', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ keywords: S.kw, cycle: S.cycle, previousKeywords: S.prev })
    });
    const d = await r.json();
    if (d.queries?.length) queries = d.queries;
  } catch {}
  S.queries = queries;
  S.prev.push(...S.kw);

  setSt('searching', true);
  // Send last 100 seen URLs to avoid repeats
  const exclude = S.seenUrls;
  let images = [];
  try {
    const r = await fetch('/api/search', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ queries, exclude, excludeTitles: S.seenTitles })
    });
    images = (await r.json()).images || [];
  } catch {}
  if (!images.length) {
    try {
      const r = await fetch('/api/search', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ queries: [S.kw.join(' ')], exclude, excludeTitles: S.seenTitles })
      });
      images = (await r.json()).images || [];
    } catch {}
  }
  if (!images.length) { setSt('retrying', false); await sleep(2000); return; }

  // LLaVA curation — score images for interestingness
  if (images.length > 14) {
    setSt('curating', true);
    try {
      const r = await fetch('/api/curate', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ images: images.slice(0, 24), keywords: S.kw, count: 20 })
      });
      const d = await r.json();
      if (d.images?.length) images = d.images;
    } catch {}
  }

  S.images = images.slice(0, 20);
  // Track seen URLs and titles
  S.images.forEach(img => {
    S.seenUrls.push(img.imageUrl || img.thumbUrl);
    if (img.title) S.seenTitles.push(img.title.toLowerCase().trim());
  });
  setSt(`${S.cycle}`, false);

  const comp = buildComp(S.images);
  showComp(comp);
  updateOv();
  saveBoard();
  evolveSoundscape();

  await sleep(S.hold);
  if (!S.running || S.paused) return;

  setSt('synthesizing', true);
  let thread = '', next = [...S.kw];
  try {
    const r = await fetch('/api/synthesize', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ keywords: S.kw, answers: {}, imageDescriptions: '', cycle: S.cycle })
    });
    const d = await r.json();
    if (d.response) {
      const tm = d.response.match(/THREAD:\s*(.+?)(?:\n|NEXT)/is);
      const nm = d.response.match(/NEXT:\s*(.+)/i);
      if (tm) thread = tm[1].trim();
      if (nm) next = nm[1].split(',').map(k => k.trim().toLowerCase()).filter(Boolean).slice(0, 5);
    }
  } catch {}

  // Fallback thread if synthesis failed or Ollama offline
  if (!thread) {
    const sources = [...new Set(S.images.map(i => i.source))].slice(0, 3).join(', ');
    thread = `Cycle ${S.cycle}: ${S.kw.join(', ')} — ${S.images.length} artifacts from ${sources}`;
  }

  S.thread = thread;

  // Save to thread archive
  S.threads.push({ cycle: S.cycle, thread, kw: [...S.kw], next: [...next] });
  renderThreadArchive();

  // Always show the thread flash
  document.getElementById('tfl').textContent = `${String(S.cycle).padStart(2, '0')}`;
  document.getElementById('tft').textContent = thread;
  document.getElementById('tfn').innerHTML = next.map((k, i) =>
    `<span class="tfk" style="animation-delay:${200 + i * 150}ms">${esc(k)}</span>`
  ).join('');
  document.getElementById('tf').classList.add('tf--on');
  await skippableSleep(10000);
  document.getElementById('tf').classList.remove('tf--on');
  await sleep(700);

  // Check cycle limit
  if (S.cycle >= 40) {
    document.getElementById('epCount').textContent = `${S.cycle} threads completed`;
    document.getElementById('endPrompt').classList.add('end-prompt--on');
    S.paused = true;
    return;
  }

  S.kw = next.length ? next : S.kw;
}

// ── Thread archive ──
function renderThreadArchive() {
  const list = document.getElementById('tarchList');
  document.getElementById('threadCount').textContent = S.threads.length;

  list.innerHTML = S.threads.slice().reverse().map(t =>
    `<div class="tarch-item">
      <div class="ta-cycle">${String(t.cycle).padStart(2, '0')}</div>
      <div class="ta-text">${esc(t.thread)}</div>
      <div class="ta-kw">${t.next.join(' / ')}</div>
    </div>`
  ).join('') || '<div class="tarch-empty">threads will appear here</div>';
}

function toggleArchive() {
  document.getElementById('tarch').classList.toggle('tarch--open');
}

// ── Controls ──
function pause() {
  S.paused = true;
  document.getElementById('pt').textContent = S.thread || '';
  document.getElementById('pov').classList.add('pov--on');
}
function resume() {
  S.paused = false;
  document.getElementById('pov').classList.remove('pov--on');
}
function restart() {
  S.running = false; S.paused = false; S.cycle = 0; S.prev = []; S.seeds = [];
  S.boards = []; S.seenUrls = []; S.seenTitles = []; S.threads = [];
  document.getElementById('pov').classList.remove('pov--on');
  document.getElementById('endPrompt').classList.remove('end-prompt--on');
  document.getElementById('st').style.display = 'none';
  document.getElementById('canvas').innerHTML = '';
  document.getElementById('ovCycle').textContent = '';
  document.getElementById('kwW').innerHTML = '';
  document.getElementById('kc').textContent = '';
  document.getElementById('ovQ').innerHTML = '';
  document.getElementById('gal').classList.remove('gal--open');
  document.getElementById('galList').innerHTML = '';
  document.getElementById('hdr').classList.remove('hdr--on');
  document.getElementById('tarch').classList.remove('tarch--open');
  document.getElementById('tarchList').innerHTML = '<div class="tarch-empty">threads will appear here</div>';
  document.getElementById('threadCount').textContent = '0';
  document.getElementById('seed').classList.remove('seed--gone');
  document.getElementById('go').style.display = 'none';
  document.getElementById('volBtn').style.display = 'none';
  if (S.audio) S.audio.master.gain.setTargetAtTime(0, S.audio.ctx.currentTime, 0.2);
  audioOn = false;
  renderChips(); inp.focus();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeLb(); closeGp(); if (S.running && !S.paused) pause(); }
});

// ── Lightbox ──
function openLb(img) {
  document.getElementById('lbI').src = img.imageUrl;
  document.getElementById('lbT').textContent = img.title + (img.artist ? ` \u2014 ${img.artist}` : '');
  document.getElementById('lbS').textContent = img.source + (img.date ? ` \u00b7 ${img.date}` : '');
  document.getElementById('lb').classList.add('lb--on');
}
function closeLb() { document.getElementById('lb').classList.remove('lb--on'); }

// ═══════════════════════════════════════════════
// AMBIENT AUDIO — Default OFF, toggle on/off
// ═══════════════════════════════════════════════
const VOL = 0.06; // master volume when on (quiet)
let audioBuilt = false, audioOn = false;

function buildAudio() {
  if (audioBuilt) return;
  audioBuilt = true;

  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const master = ctx.createGain();
  master.gain.value = 0; // starts silent
  master.connect(ctx.destination);

  // Brown noise
  const bufSz = 2 * ctx.sampleRate;
  const buf = ctx.createBuffer(2, bufSz, ctx.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = buf.getChannelData(ch);
    let last = 0;
    for (let i = 0; i < bufSz; i++) {
      d[i] = (last + 0.02 * (Math.random() * 2 - 1)) / 1.02;
      last = d[i]; d[i] *= 3.5;
    }
  }
  const noise = ctx.createBufferSource();
  noise.buffer = buf; noise.loop = true; noise.start();

  const bp1 = ctx.createBiquadFilter();
  bp1.type = 'bandpass'; bp1.frequency.value = 180; bp1.Q.value = 0.8;
  const bp2 = ctx.createBiquadFilter();
  bp2.type = 'bandpass'; bp2.frequency.value = 420; bp2.Q.value = 1.2;
  const bp2G = ctx.createGain(); bp2G.gain.value = 0.25;

  noise.connect(bp1); noise.connect(bp2);
  bp1.connect(master); bp2.connect(bp2G); bp2G.connect(master);

  // Modulation
  (function mod() {
    const t = ctx.currentTime;
    bp1.frequency.setTargetAtTime(120 + (Math.sin(t * 0.05) * 0.5 + 0.5) * 100, t, 2);
    bp2.frequency.setTargetAtTime(300 + (Math.sin(t * 0.02) * 0.5 + 0.5) * 180, t, 3);
    if (audioBuilt) requestAnimationFrame(mod);
  })();

  // Sub drone
  const dr = ctx.createOscillator(); dr.type = 'sine'; dr.frequency.value = 55;
  const drG = ctx.createGain(); drG.gain.value = 0.02;
  dr.connect(drG); drG.connect(master); dr.start();
  (function drift() {
    dr.frequency.setTargetAtTime(50 + Math.sin(ctx.currentTime * 0.015) * 8, ctx.currentTime, 4);
    if (audioBuilt) setTimeout(drift, 3000);
  })();

  S.audio = { master, ctx };
}

function toggleAudio() {
  buildAudio();
  audioOn = !audioOn;
  const btn = document.getElementById('volBtn');
  const { master, ctx } = S.audio;
  if (audioOn) {
    if (ctx.state === 'suspended') ctx.resume();
    master.gain.setTargetAtTime(VOL, ctx.currentTime, 0.5);
    btn.textContent = 'sound on';
    btn.classList.add('vol-toggle--on');
  } else {
    master.gain.setTargetAtTime(0, ctx.currentTime, 0.3);
    btn.textContent = 'sound off';
    btn.classList.remove('vol-toggle--on');
  }
}

function evolveSoundscape() {
  if (!S.audio || !audioOn) return;
  const { master, ctx } = S.audio;
  const t = ctx.currentTime;
  master.gain.setTargetAtTime(VOL * 0.4, t, 0.5);
  master.gain.setTargetAtTime(VOL, t + 3, 1);
}

// ── Skippable sleep (for thread flash) ──
let _skipResolve = null;

function skippableSleep(ms) {
  return new Promise(resolve => {
    _skipResolve = resolve;
    setTimeout(() => { _skipResolve = null; resolve(); }, ms);
  });
}

function skipThread() {
  document.getElementById('tf').classList.remove('tf--on');
  if (_skipResolve) { const r = _skipResolve; _skipResolve = null; r(); }
}

function keepGoing() {
  document.getElementById('endPrompt').classList.remove('end-prompt--on');
  S.paused = false;
}

// ── Light background detection ──
// Returns true if image has a light/white background — should get multiply blend
function detectLightBg(imgEl) {
  try {
    const c = document.createElement('canvas');
    const sz = 50;
    c.width = sz; c.height = sz;
    const ctx = c.getContext('2d');
    ctx.drawImage(imgEl, 0, 0, sz, sz);
    const d = ctx.getImageData(0, 0, sz, sz).data;

    // Sample edges (4px border) AND corners (8x8 blocks)
    let lightCount = 0, sampleCount = 0;
    for (let y = 0; y < sz; y++) {
      for (let x = 0; x < sz; x++) {
        const isEdge = y < 4 || y >= sz - 4 || x < 4 || x >= sz - 4;
        const isCorner = (y < 8 && x < 8) || (y < 8 && x >= sz - 8) ||
                         (y >= sz - 8 && x < 8) || (y >= sz - 8 && x >= sz - 8);
        if (!isEdge && !isCorner) continue;
        const idx = (y * sz + x) * 4;
        const r = d[idx], g = d[idx+1], b = d[idx+2];
        sampleCount++;
        // Detect light backgrounds: white, cream, beige, light gray
        const brightness = (r + g + b) / 3;
        if (brightness > 190) lightCount++;
      }
    }
    return sampleCount > 0 && (lightCount / sampleCount) > 0.45;
  } catch { return false; }
}

// ── Util ──
function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
function rand(a, b) { return a + Math.random() * (b - a); }

// ── Init ──
fetch('/api/health').then(r => r.json()).then(d => {
  S.llm = d.llm || 'none';
}).catch(() => { S.llm = 'none'; });
</script>
